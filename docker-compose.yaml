services:
  mcp-servicenow:
    build: .
    container_name: mcp-servicenow-connector
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8080}:8080"
    environment:
      # ServiceNow connection
      SERVICENOW_INSTANCE: ${SERVICENOW_INSTANCE}
      SERVICENOW_OAUTH_CLIENT_ID: ${SERVICENOW_OAUTH_CLIENT_ID}
      SERVICENOW_OAUTH_CLIENT_SECRET: ${SERVICENOW_OAUTH_CLIENT_SECRET}

      # MCP server config
      MCP_SERVER_BASE_URL: ${MCP_SERVER_BASE_URL:-http://localhost:8080}
      MCP_SERVER_PORT: "8080"
      MCP_SERVER_HOST: "0.0.0.0"

      # Tool profile (tickets = locked down, itsm = IT staff, full = everything)
      SERVICENOW_TOOL_PROFILE: ${SERVICENOW_TOOL_PROFILE:-tickets}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8080/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
