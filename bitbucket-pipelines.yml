image: python:3.11-slim

clone:
  depth: full # SonarQube Cloud scanner needs the full history to assign issues properly

definitions:
  services:
    docker:
      memory: 2048
  caches:
    sonar: ~/.sonar/cache
    pip: ~/.cache/pip

pipelines:
  default:
    - step:
        name: Test & Coverage
        caches:
          - pip
        script:
          - pip install -r requirements.txt pytest-asyncio
          - pytest tests/ --cov=. --cov-report=xml:coverage.xml --junitxml=test-results.xml
        artifacts:
          - coverage.xml
          - test-results.xml
    - step:
        name: Security & Quality Scan
        caches:
          - sonar
          - docker
        script:
          - pipe: sonarsource/sonarcloud-scan:4.1.0
            variables:
              SONAR_TOKEN: $SONAR_TOKEN
